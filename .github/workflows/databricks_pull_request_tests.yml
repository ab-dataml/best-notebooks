name: Run pre-merge Databricks tests

on:
  pull_request:

env:
  # It is often safer to pull the host from a secret too, 
  # but you can hardcode it here if it's not sensitive.
  DATABRICKS_HOST: https://dbc-0e48714d-53c3.cloud.databricks.com/

jobs:
  unit-test-notebook:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v2

      - name: Run test notebook
        uses: databricks/run-notebook@main
        with:
          # Pulls the token from GitHub Secrets
          databricks-token: ${{ secrets.DATABRICKS_TOKEN }}

          local-notebook-path: notebooks/run_unit_tests.py

          # Pulls the cluster ID from GitHub Secrets
          existing-cluster-id: 0415-202838-vmscd0l0

          git-commit: '${{ github.event.pull_request.head.sha }}'

          access-control-list-json: >
            [
              {
                "group_name": "users",
                "permission_level": "CAN_VIEW"
              }
            ]
          run-name: 'EDA transforms helper module unit tests'
